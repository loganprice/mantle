run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - cyclop
    - revive
    - gocritic
    - stylecheck
    - prealloc
    - unconvert
    - misspell
    - nakedret
    - unparam

linters-settings:
  cyclop:
    max-complexity: 15
  revive:
    rules:
      - name: exported
      - name: package-comments
      - name: error-naming
      - name: error-strings
      - name: error-return
      - name: var-naming
      - name: var-declaration
      - name: receiver-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: redefines-builtin-id
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam # duplicated by heavy struct check often
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
    # ST1000: Package comment. Revive handles this.
    # ST1003: Poorly chosen identifier. Revive handles this.
  goimports:
    local-prefixes: github.com/loganprice/mantle

issues:
  exclude-use-default: false
  max-same-issues: 0
