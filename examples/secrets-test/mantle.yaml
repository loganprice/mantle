# syntax=mantle:dev
version: "1.0"
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
pipeline:
  - name: test-secret
    uses: alpine:3.20
    mounts:
      - type: secret
        target: /run/secrets/my-token
        source: testsecret
    run:
      - mkdir -p /install
      - cat /run/secrets/my-token > /install/token.txt
    exports:
      - source: /install
        destination: /opt/secrets
runtime:
  user: 65532
  workdir: /
  entrypoint: ["cat", "/opt/secrets/token.txt"]
